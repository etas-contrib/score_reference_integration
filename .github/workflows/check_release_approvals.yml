name: Check Release Branch Approvals
on:
  pull_request_review:
    types: [submitted, edited, dismissed]
jobs:
  check-approvals:
    name: Verify Required Approvals
    if: startsWith(github.event.pull_request.base.ref, 'releases/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name == 'push' }}
      - name: Check Release Approvals
        id: check-approvals
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.base_ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bazel run //scripts/tooling -- release check_approvals
      - name: Success
        if: steps.check-approvals.outputs.all-approved == 'true'
        run: |
          echo "✅ All modules have required approvals"
          echo "Approved modules: ${{ steps.check-approvals.outputs.approved-modules }}"
